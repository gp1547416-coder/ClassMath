<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassMath | Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans">

    <div class="text-center p-10 bg-white shadow-2xl rounded-3xl border border-gray-100 max-w-sm w-full mx-4">
        <h1 class="text-4xl font-black text-blue-600 mb-2">ClassMath</h1>
        <p class="text-gray-400 text-sm mb-8 uppercase tracking-widest">Student Portal</p>
        
        <div id="start-section">
            <button onclick="showLogin()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-all shadow-lg hover:shadow-blue-200">
                Start Learning
            </button>
        </div>

        <div id="code-section" class="hidden">
            <form onsubmit="handleRedirect(event)">
                <input 
                    type="text" 
                    id="classCode" 
                    placeholder="Enter Class Code" 
                    class="w-full px-4 py-4 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none mb-4 text-center text-lg font-medium"
                    autocomplete="off"
                >
                <button type="submit" class="w-full py-4 bg-black text-white font-bold rounded-xl hover:bg-gray-800 transition-all">
                    Continue
                </button>
            </form>
            <button onclick="hideLogin()" class="mt-6 text-sm text-gray-400 hover:text-blue-600 transition-colors">← Back to home</button>
        </div>
    </div>

    <script>
        const startSection = document.getElementById('start-section');
        const codeSection = document.getElementById('code-section');
        const codeInput = document.getElementById('classCode');

        function showLogin() {
            startSection.classList.add('hidden');
            codeSection.classList.remove('hidden');
            codeInput.focus();
        }

        function hideLogin() {
            startSection.classList.remove('hidden');
            codeSection.classList.add('hidden');
            codeInput.value = "";
        }

        function handleRedirect(event) {
            event.preventDefault();
            const val = codeInput.value.trim();

            // Logic: exactly "lol" lowercase
            if (val === "lol") {
                window.location.href = "https://LearnNew.vercel.app";
            } else {
                alert("Invalid code. Please contact your instructor.");
                codeInput.value = "";
            }
        }
    </script>
</body>
</html>
